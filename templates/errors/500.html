{% extends "base.html" %}
{% block title %}Server Error{% endblock %}

{% block content %}
<div class="error-page">
  <div class="error-code">500</div>
  <h2 class="error-title">Internal Server Error</h2>
  <p class="error-desc">Something went wrong on our end. Please try again in a moment.</p>
  {% if current_user.is_authenticated %}
  <a href="{{ url_for('dashboard.index') }}" class="btn btn-auth">Back to Dashboard</a>
  {% else %}
  <a href="{{ url_for('auth.login') }}" class="btn btn-auth">Go to Login</a>
  {% endif %}
</div>
{% endblock %}
